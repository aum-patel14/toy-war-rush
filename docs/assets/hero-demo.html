<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Toy War Rush Hero Demo (for recording)</title>
  <style>body{margin:0;background:#1a0a2e;display:flex;justify-content:center;align-items:center;min-height:100vh}</style>
</head>
<body>
  <iframe src="../../preview/index.html" width="360" height="640" style="border:4px solid #FFE66D;border-radius:24px;box-shadow:0 0 0 8px #9B5DE5"></iframe>
  <script>
    // Auto-starts game after load for screen recording
    window.addEventListener('load', function() {
      setTimeout(function() {
        var f = document.querySelector('iframe');
        if (f && f.contentWindow) {
          var btn = f.contentDocument && f.contentDocument.getElementById('playBtn');
          if (btn) btn.click();
        }
      }, 800);
    });
  </script>
</body>
</html>
